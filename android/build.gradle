buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
    project.ext {
        useExoplayerHls = true     // Enable HLS support
        useExoplayerDash = true    // Enable DASH support
        useExoplayerRtsp = false   // Disable RTSP
        useExoplayerIMA = false    // Disable IMA ads
        useExoplayerSmoothStreaming = false  // Disable Smooth Streaming
    }
}

apply plugin: "com.facebook.react.rootproject"
